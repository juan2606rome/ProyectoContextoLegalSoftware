
<style>
  @keyframes spin-slow  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes dash-flow  { from{stroke-dashoffset:48} to{stroke-dashoffset:0} }
  @keyframes pulse-ring { 0%{r:56;opacity:.2} 70%{r:72;opacity:0} 100%{r:72;opacity:0} }
  @keyframes dot-beat   { 0%,100%{r:3.5} 50%{r:5} }
  .spin      { animation: spin-slow 22s linear infinite; transform-origin:340px 320px; }
  .flow-t    { stroke-dasharray:7 5; animation: dash-flow 1.3s linear infinite; }
  .flow-b    { stroke-dasharray:7 5; animation: dash-flow 1.3s linear infinite reverse; }
  .pring     { animation: pulse-ring 2.6s ease-out infinite; transform-origin:340px 320px; }
  .db { animation: dot-beat 2s ease-in-out infinite; }
  .db2{ animation: dot-beat 2s ease-in-out infinite .35s; }
  .db3{ animation: dot-beat 2s ease-in-out infinite .7s; }
  .db4{ animation: dot-beat 2s ease-in-out infinite 1.05s; }
  .db5{ animation: dot-beat 2s ease-in-out infinite 1.4s; }
  .db6{ animation: dot-beat 2s ease-in-out infinite 1.75s; }
</style>

</defs>
